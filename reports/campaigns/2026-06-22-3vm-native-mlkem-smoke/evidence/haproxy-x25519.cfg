global
    log stdout format raw local0
    maxconn 4096
    stats socket /tmp/pqc-haproxy.sock mode 600 level admin
    ssl-default-bind-options ssl-min-ver TLSv1.3 ssl-max-ver TLSv1.3 no-tls-tickets

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 2s
    timeout client 5s
    timeout server 5s

frontend pqc_tls_frontend
    bind 0.0.0.0:8443 ssl crt /home/rebel/pqc-3vm-gateway/haproxy-smoke/gateway.pem curves X25519 alpn http/1.1
    default_backend backend_delay

backend backend_delay
    server backend1 192.168.122.99:18081 check
